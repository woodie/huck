name: Windows package

# Builds a real Windows .msi on a real (ephemeral, GitHub-hosted) Windows
# machine -- see docs/COWORK.md for why this replaces needing physical
# Windows hardware for anything but final manual smoke-testing.
on:
  push:
    branches: [main]
    # Tags matching v* (e.g. v0.2.0) additionally attach the .msi to a real
    # GitHub Release below -- pushing a tag is how a build here becomes a
    # downloadable release artifact, not just a CI-verified build.
    tags: ["v*"]
  pull_request:
  workflow_dispatch:

jobs:
  package-msi:
    runs-on: windows-latest
    # Needed for the release step below. GITHUB_TOKEN's default permissions
    # are read-only on repos where "Workflow permissions" is left at its
    # (now-default) restricted setting -- confirmed by a real failed run:
    # softprops/action-gh-release got a 403 "Resource not accessible by
    # integration" trying to create the v0.2.0 release, even on a same-repo
    # tag push. Without this block, only a repo-level Settings > Actions >
    # General > Workflow permissions change (a manual, per-repo setting, not
    # something this file can express) would grant it instead.
    permissions:
      contents: write
    steps:
      # Checked out to an explicit `huck` subpath, not $GITHUB_WORKSPACE's root
      # -- see the sibling-checkout comment below for why.
      - name: Check out huck
        uses: actions/checkout@v4
        with:
          path: huck

      # settings.gradle.kts's includeBuild("../humane-kotlin") needs this to
      # land as a real sibling of huck's own checkout directory. The previous
      # version of this workflow checked huck out to $GITHUB_WORKSPACE's root
      # and humane-kotlin to `path: humane-kotlin` -- but actions/checkout's
      # `path` is relative to $GITHUB_WORKSPACE itself, not its parent, so
      # that actually landed humane-kotlin *inside* huck's own checkout
      # ($GITHUB_WORKSPACE/humane-kotlin, a subdirectory of huck, not a
      # sibling), leaving "../humane-kotlin" relative to huck pointing one
      # level too high (confirmed by a real failed run: "Included build
      # 'D:\a\huck\humane-kotlin' does not exist"). Giving huck itself an
      # explicit `path: huck` fixes this the simple way: both repos are now
      # plain subdirectories of $GITHUB_WORKSPACE, so they're true siblings
      # of each other with no parent-relative path trick (e.g. `path:
      # ../humane-kotlin`) needed -- that trick also requires
      # actions/checkout's `allow_parent_path: true`, which isn't available
      # on the v4 major version this workflow pins.
      - name: Check out humane-kotlin as a sibling checkout
        uses: actions/checkout@v4
        with:
          repository: woodie/humane-kotlin
          path: humane-kotlin

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Package Windows installer
        working-directory: huck
        run: .\gradlew.bat packageMsi

      # Path is Compose Desktop's documented default output location for this
      # task, prefixed with huck/ now that huck is checked out to that
      # subpath -- not yet confirmed against a real run, since this workflow
      # hasn't executed yet. Adjust if the actual artifact lands elsewhere.
      - name: Upload the .msi
        uses: actions/upload-artifact@v4
        with:
          name: huck-msi
          path: huck/build/compose/binaries/main/msi/*.msi

      # Only on a version tag (v0.2.0, etc.), not on every push to main or PR --
      # attaches the same .msi to a real GitHub Release instead of leaving it
      # buried in a workflow run's artifact list. softprops/action-gh-release
      # both creates the release (from the tag) and uploads the file in one
      # step; the job-level permissions: contents: write above is what lets
      # GITHUB_TOKEN actually do that, no extra secret required.
      - name: Attach the .msi to a GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: huck/build/compose/binaries/main/msi/*.msi
          generate_release_notes: true
